name: senji-gateway CI/CD

on:
  push:
    branches: [main]
    paths:
      - "senji-gateway/**"
      - ".github/workflows/senji-pics.yml"
  pull_request:
    branches: [main]
    paths:
      - "senji-gateway/**"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/senji-gateway

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: senji-gateway
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install ruff

      - run: ruff check .
      - run: ruff format --check .

  test:
    name: Unit + Integration Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: senji-gateway
    env:
      OLLAMA_BASE_URL: http://localhost:11434
      SENJI_TOKEN: test-token
      VAULT_PATH: /tmp/vault
      SQLITE_DB_PATH: /tmp/vault/jobs.db
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -e ".[dev]"

      - name: Create test vault
        run: mkdir -p /tmp/vault && touch /tmp/vault/index.md

      - name: Run unit tests with coverage
        run: |
          pip install pytest-cov
          pytest tests/ -v \
            --cov=app \
            --cov-report=term-missing \
            --cov-fail-under=80 \
            -m "not integration"

      - name: Run integration tests (mock Ollama)
        run: |
          pytest tests/ -v -m "integration" || true

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        if: github.ref == 'refs/heads/main'
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./senji-gateway
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Trigger Proxmox Deploy
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Trigger webhook
        run: |
          curl -f -X POST https://deploy.myloft.cloud/hooks/deploy-senji \
            -H "X-Webhook-Secret: ${{ secrets.WEBHOOK_SECRET }}"
