# systemd drop-in for senji-webhook.service
#
# Installed to /etc/systemd/system/senji-webhook.service.d/senji.conf
# by scripts/deploy.sh. The base unit (webhook/senji-webhook.service) is a
# one-time bootstrap artifact and MUST NOT be rewritten on every deploy:
# rewriting it would silently drop sibling consumers' -hooks flags (e.g.
# otoflow's). See specs/cicd-pipeline.md "Shared webhook drop-in pattern".
#
# Pattern A4 ("mirror otoflow"): this drop-in lists BOTH senji's and otoflow's
# live hooks files in ExecStart=. otoflow ships an identical mirror drop-in at
# /etc/systemd/system/senji-webhook.service.d/otoflow.conf. Drop-ins merge
# alphabetically; whichever drop-in is parsed last wins ExecStart=. Because
# both drop-ins set the same value, either order is correct.
#
# BRITTLENESS WARNING: when a 3rd sibling joins, OR when otoflow leaves the
# VM, every existing drop-in must be updated in lockstep. The empty
# `ExecStart=` line clears the inherited value before re-setting it — this is
# the standard systemd idiom for fully overriding a multi-arg ExecStart.

[Service]
ExecStart=
ExecStart=/usr/bin/webhook -hooks /etc/senji-hooks-live.json -hooks /etc/otoflow-hooks-live.json -port 9000 -verbose
