services:
  gateway:
    build: ./senji-gateway
    ports:
      - "7878:8000"
    env_file: .env
    restart: unless-stopped
    depends_on:
      readability:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
    networks: [senji-net]

  readability:
    build: ./senji-readability
    expose: ["3000"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 256M
    networks: [senji-net]

  obsidian-remote:
    image: ghcr.io/sytone/obsidian-remote:latest
    ports:
      - "7899:8080"
    volumes:
      - /opt/vault:/vaults
    environment:
      - PUID=1000
      - PGID=1000
    restart: unless-stopped
    networks: [senji-net]

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    ports:
      - "8080:8080"
    volumes:
      - open-webui-data:/app/backend/data
      - /opt/vault:/vault:ro
    environment:
      - OLLAMA_BASE_URL=http://10.1.1.222:11434
      - WEBUI_AUTH=true
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
    networks: [senji-net]

networks:
  senji-net:
    driver: bridge

volumes:
  open-webui-data:
