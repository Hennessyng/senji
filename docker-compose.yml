services:
  gateway:
    build: ./senji-gateway
    ports:
      - "7878:8000"
    env_file: .env
    restart: unless-stopped
    depends_on:
      readability:
        condition: service_healthy
      docling:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
    networks: [senji-net]
  readability:
    build: ./senji-readability
    expose: ["3000"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 256M
    networks: [senji-net]
  docling:
    image: ghcr.io/docling-project/docling-serve:latest
    expose: ["5001"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:5001/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 8G
    networks: [senji-net]
networks:
  senji-net:
    driver: bridge
