services:
  gateway:
    build: ./senji-gateway
    ports:
      - "7878:8000"
    env_file: .env
    volumes:
      - vault:/opt/vault
    restart: unless-stopped
    depends_on:
      readability:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    mem_limit: 512m
    memswap_limit: 512m
    networks: [senji-net]

  readability:
    build: ./senji-readability
    expose: ["3000"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    mem_limit: 256m
    memswap_limit: 256m
    networks: [senji-net]

  obsidian-remote:
    image: ghcr.io/sytone/obsidian-remote:latest
    ports:
      - "7899:8080"
    volumes:
      - vault:/vaults
      - obsidian-config:/config
    environment:
      - PUID=1000
      - PGID=1000
    restart: unless-stopped
    mem_limit: 1g
    memswap_limit: 1g
    networks: [senji-net]

networks:
  senji-net:
    driver: bridge

volumes:
  obsidian-config:

  vault:
    driver: local
    driver_opts:
      type: nfs
      o: nfsvers=4,addr=10.1.1.250,hard,timeo=600,retrans=2,rw,noac
      device: ":/local/dockerdata/vault"
